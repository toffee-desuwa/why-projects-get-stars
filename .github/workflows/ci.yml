name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: python -m compileall .

      - run: python -m unittest -q

      - run: python main.py score --repo shadcn-ui/ui --format json > out1.json

      - run: python main.py score --repo shadcn-ui/ui --format json > out2.json

      - run: diff out1.json out2.json
